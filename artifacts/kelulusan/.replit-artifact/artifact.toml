kind = "web"
previewPath = "/"
title = "Website Kelulusan Sekolah"
version = "1.0.0"
id = "artifacts/kelulusan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22774

[services.development]
run = "pnpm --filter @workspace/kelulusan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kelulusan", "run", "build" ]
publicDir = "artifacts/kelulusan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22774"
BASE_PATH = "/"
